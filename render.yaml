# Render Blueprint — creates the API service + Postgres in one click
# (Dashboard > New > Blueprint, point it at this repo)
services:
  - type: web
    name: agripilot-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: MOCK_MODE
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: agripilot-db
          property: connectionString
      - key: FRONTEND_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false

databases:
  - name: agripilot-db
    plan: free
